 <head>

  <style>
    :root {
      --bg-gradient-start: #0F1B3C;
      --bg-gradient-mid: #2D3E6F;
      --bg-gradient-end: #1A2847;
      --gold-primary: #FFD700;
      --gold-light: #FFF44F;
      --gold-dark: #DAA520;
      --pink-soft: #FFB6E1;
      --pink-deep: #FF69B4;
      --cream: #FFFBF5;
      --moon-glow: #F0E68C;
      --star-blue: #87CEEB;
    }
    
    html, body {
      height: 100%;
      margin: 0;
    }
    
    .main-wrapper {
      height: 100%;
      width: 100%;
      overflow: auto;
    }
    
    .dreamscape-bg {
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(135, 206, 235, 0.15) 0%, transparent 40%),
        radial-gradient(ellipse at 80% 30%, rgba(240, 230, 140, 0.1) 0%, transparent 30%),
        linear-gradient(135deg, #0F1B3C 0%, #2D3E6F 30%, #1a2847 60%, #0F1B3C 100%);
    }
    
    .gold-text {
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold-primary) 30%, var(--gold-dark) 60%, var(--gold-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 4px rgba(212, 165, 116, 0.4));
    }
    
    .calligraphy-font {
      font-family: 'Great Vibes', cursive;
    }
    
    .elegant-font {
      font-family: 'Cormorant Garamond', serif;
    }
    
    /* Floating petals animation */
    .petal {
      position: absolute;
      opacity: 0.7;
      animation: float-petal linear infinite;
      pointer-events: none;
    }
    
    @keyframes float-petal {
      0% {
        transform: translateY(-20px) rotate(0deg) scale(1);
        opacity: 0;
      }
      10% {
        opacity: 0.7;
      }
      90% {
        opacity: 0.7;
      }
      100% {
        transform: translateY(100%) rotate(360deg) scale(0.8);
        opacity: 0;
      }
    }
    
    /* Shimmer effect */
    .shimmer {
      position: relative;
      overflow: hidden;
    }
    
    .shimmer::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      animation: shimmer 3s ease-in-out infinite;
    }
    
    @keyframes shimmer {
      0%, 100% { left: -100%; }
      50% { left: 150%; }
    }
    
    /* Glow pulse */
    .glow-pulse {
      animation: glow 4s ease-in-out infinite;
    }
    
    @keyframes glow {
      0%, 100% {
        filter: drop-shadow(0 0 20px rgba(212, 165, 116, 0.3));
      }
      50% {
        filter: drop-shadow(0 0 40px rgba(212, 165, 116, 0.6));
      }
    }
    
    /* Sparkle animation */
    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--gold-light);
      border-radius: 50%;
      animation: sparkle 2s ease-in-out infinite;
    }
    
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
    }
    
    /* Ethereal light rays */
    .light-rays {
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: conic-gradient(
        from 0deg at 50% 50%,
        transparent 0deg,
        rgba(212, 165, 116, 0.05) 10deg,
        transparent 20deg,
        rgba(251, 207, 232, 0.05) 30deg,
        transparent 40deg
      );
      animation: rotate-rays 60s linear infinite;
    }
    
    @keyframes rotate-rays {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    /* Twinkling stars */
    .star-twinkle {
      animation: twinkle 3s ease-in-out infinite;
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    
    /* Floating rose animation */
    .floating-rose {
      animation: float-rose 6s ease-in-out infinite;
    }
    
    @keyframes float-rose {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-20px) rotate(10deg); }
      50% { transform: translateY(-40px) rotate(0deg); }
      75% { transform: translateY(-20px) rotate(-10deg); }
    }
    
    /* Moon glow pulse */
    .moon-pulse {
      animation: moon-glow 4s ease-in-out infinite;
    }
    
    @keyframes moon-glow {
      0%, 100% { filter: drop-shadow(0 0 30px rgba(240, 230, 140, 0.6)); }
      50% { filter: drop-shadow(0 0 50px rgba(240, 230, 140, 1)); }
    }
    
    /* Trophy glow */
    .trophy-glow {
      animation: trophy-shine 2s ease-in-out infinite;
    }
    
    @keyframes trophy-shine {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.7)); }
      50% { filter: drop-shadow(0 0 35px rgba(255, 215, 0, 1)); }
    }
    
    .fade-in {
      animation: fadeIn 1.5s ease-out forwards;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .fade-in-delay-1 { animation-delay: 0.3s; opacity: 0; }
    .fade-in-delay-2 { animation-delay: 0.6s; opacity: 0; }
    .fade-in-delay-3 { animation-delay: 0.9s; opacity: 0; }
    
    /* Bouncy emoji animation */
    .bouncy-emoji {
      display: inline-block;
      animation: bounce-jump 0.8s ease-in-out infinite;
    }
    
    @keyframes bounce-jump {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-15px) rotate(5deg); }
      50% { transform: translateY(-25px) rotate(-5deg); }
      75% { transform: translateY(-10px) rotate(3deg); }
    }
    
    /* Spin animation for confetti */
    .spin-confetti {
      animation: spin-fast 1.5s linear infinite;
    }
    
    @keyframes spin-fast {
      from { transform: rotate(0deg) scale(1); }
      to { transform: rotate(360deg) scale(1.2); }
    }
    
    /* Wiggle animation */
    .wiggle {
      animation: wiggle-side 0.5s ease-in-out infinite;
    }
    
    @keyframes wiggle-side {
      0%, 100% { transform: skewX(0deg); }
      25% { transform: skewX(3deg); }
      75% { transform: skewX(-3deg); }
    }
    
    /* Pulse celebration */
    .pulse-celebrate {
      animation: pulse-pop 1s ease-out infinite;
    }
    
    @keyframes pulse-pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    
    /* Dodgy button */
    .dodgy-btn {
      position: fixed;
      padding: 14px 32px;
      font-size: 17px;
      font-weight: bold;
      background: linear-gradient(135deg, #FFD700, #FFF44F);
      color: #1a1a1a;
      border: 3px solid #DAA520;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: 'Cormorant Garamond', serif;
      box-shadow: 0 4px 15px rgba(212, 165, 116, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.6);
      z-index: 50;
      user-select: none;
    }
    
    .dodgy-btn:hover {
      background: linear-gradient(135deg, #FFF44F, #FFD700);
      box-shadow: 0 8px 25px rgba(212, 165, 116, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.8);
      transform: scale(1.08);
    }
    
    .dodgy-btn:active {
      transform: scale(0.95);
    }
    
    /* Wiggle animation when moving */
    .btn-escape {
      animation: escape-wiggle 0.4s ease-out;
    }
    
    @keyframes escape-wiggle {
      0% { transform: scale(1) rotate(0deg); }
      25% { transform: scale(1.05) rotate(2deg); }
      50% { transform: scale(1.06) rotate(-3deg); }
      75% { transform: scale(1.04) rotate(1deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    
    /* Bonus message that appears */
    .bonus-msg {
      position: fixed;
      font-family: 'Great Vibes', cursive;
      color: #FFD700;
      font-size: 18px;
      pointer-events: none;
      z-index: 40;
      animation: float-away 2s ease-out forwards;
    }
    
    @keyframes float-away {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(0, -50px) scale(0.8);
      }
    }
  </style>

  <script>
    const defaultConfig = {
      main_greeting: "Happy Women's Day",
      recipient_name: "Ritika",
      background_color: "#FDF2F8",
      gold_color: "#D4A574",
      pink_color: "#EC4899",
      text_color: "#F9A8D4",
      font_family: "Great Vibes"
    };

    // Create floating petals
    function createPetals() {
      const container = document.getElementById('petals-container');
      const petalColors = ['#FBCFE8', '#F9A8D4', '#FDF2F8', '#E8C89E', '#FECDD3'];
      
      for (let i = 0; i < 20; i++) {
        const petal = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        petal.classList.add('petal');
        petal.setAttribute('width', '20');
        petal.setAttribute('height', '20');
        petal.setAttribute('viewBox', '0 0 20 20');
        petal.innerHTML = `<ellipse cx="10" cy="10" rx="8" ry="5" fill="${petalColors[Math.floor(Math.random() * petalColors.length)]}" transform="rotate(${Math.random() * 360} 10 10)"/>`;
        
        petal.style.left = `${Math.random() * 100}%`;
        petal.style.animationDuration = `${8 + Math.random() * 8}s`;
        petal.style.animationDelay = `${Math.random() * 10}s`;
        petal.style.width = `${15 + Math.random() * 15}px`;
        
        container.appendChild(petal);
      }
    }

    createPetals();

    // Dodgy button logic - Version 1 Enhanced
    const dodgyBtn = document.getElementById('dodgy-btn');
    let isMoving = false;
    let escapeCount = 0;
    const bonusMessages = [
      "You're quick! 😄",
      "Nice try! 🎯",
      "Getting closer! ✨",
      "Almost there! 🌟",
      "Good reflexes! 💫",
      "She's speedy! 🏃‍♀️",
      "Keep trying! 🎉",
      "Can you catch her? 🦋"
    ];

    function createBonusMessage(x, y) {
      const msg = document.createElement('div');
      msg.classList.add('bonus-msg');
      msg.textContent = bonusMessages[Math.floor(Math.random() * bonusMessages.length)];
      msg.style.left = x + 'px';
      msg.style.top = y + 'px';
      document.body.appendChild(msg);
      
      setTimeout(() => msg.remove(), 2000);
    }

    function moveButtonAway() {
      if (isMoving) return;
      isMoving = true;
      escapeCount++;

      // Add wiggle animation
      dodgyBtn.classList.remove('btn-escape');
      void dodgyBtn.offsetWidth; // Trigger reflow
      dodgyBtn.classList.add('btn-escape');

      // Get button center for bonus message
      const btnCenterX = dodgyBtn.offsetLeft + dodgyBtn.offsetWidth / 2;
      const btnCenterY = dodgyBtn.offsetTop + dodgyBtn.offsetHeight / 2;

      // Create bonus message
      createBonusMessage(btnCenterX, btnCenterY);

      // Calculate random position within viewport with padding
      const padding = 60;
      const maxX = Math.max(padding, window.innerWidth - dodgyBtn.offsetWidth - padding);
      const maxY = Math.max(padding, window.innerHeight - dodgyBtn.offsetHeight - padding);

      const randomX = Math.max(padding, Math.random() * maxX);
      const randomY = Math.max(padding, Math.random() * maxY);

      // Smooth transition to new position
      dodgyBtn.style.transition = 'all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1)';
      dodgyBtn.style.left = randomX + 'px';
      dodgyBtn.style.top = randomY + 'px';

      // Reset flag after animation completes
      setTimeout(() => {
        isMoving = false;
        dodgyBtn.classList.remove('btn-escape');
      }, 350);
    }

    // Move away on mouse enter (hover)
    dodgyBtn.addEventListener('mouseenter', moveButtonAway);

    // Also move away on click attempt
    dodgyBtn.addEventListener('click', (e) => {
      e.preventDefault();
      moveButtonAway();
    });

    // Move away on touch for mobile
    dodgyBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      moveButtonAway();
    });

    // Initial random position
    setTimeout(() => {
      const padding = 60;
      const maxX = Math.max(padding, window.innerWidth - dodgyBtn.offsetWidth - padding);
      const maxY = Math.max(padding, window.innerHeight - dodgyBtn.offsetHeight - padding);
      dodgyBtn.style.left = Math.max(padding, Math.random() * maxX) + 'px';
      dodgyBtn.style.top = Math.max(padding, Math.random() * maxY) + 'px';
    }, 500);

    // Element SDK integration
    async function onConfigChange(config) {
      const mainGreeting = document.getElementById('main-greeting');
      const recipientName = document.getElementById('recipient-name');
      
      if (mainGreeting) {
        mainGreeting.textContent = config.main_greeting || defaultConfig.main_greeting;
      }
      if (recipientName) {
        recipientName.textContent = config.recipient_name || defaultConfig.recipient_name;
      }
      
      // Apply font family
      const fontFamily = config.font_family || defaultConfig.font_family;
      document.querySelectorAll('.calligraphy-font').forEach(el => {
        el.style.fontFamily = `${fontFamily}, cursive`;
      });
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (value) => {
              config.background_color = value;
              window.elementSdk.setConfig({ background_color: value });
            }
          },
          {
            get: () => config.gold_color || defaultConfig.gold_color,
            set: (value) => {
              config.gold_color = value;
              window.elementSdk.setConfig({ gold_color: value });
            }
          },
          {
            get: () => config.pink_color || defaultConfig.pink_color,
            set: (value) => {
              config.pink_color = value;
              window.elementSdk.setConfig({ pink_color: value });
            }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => {
              config.text_color = value;
              window.elementSdk.setConfig({ text_color: value });
            }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (value) => {
            config.font_family = value;
            window.elementSdk.setConfig({ font_family: value });
          }
        },
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ["main_greeting", config.main_greeting || defaultConfig.main_greeting],
        ["recipient_name", config.recipient_name || defaultConfig.recipient_name]
      ]);
    }

    // Initialize SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }
